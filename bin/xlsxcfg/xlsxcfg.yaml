# Protocol Buffer schemas
proto:
  enabled: true
  # proto files need to parse.
  files: [ "example.proto" ]
  # proto message import paths.
  import_path: [ "." ]

# xlsx sheet config
sheet:
  # rows that is comment, will ignore
  # in parsing
  comment_rows: [ 1 ]
  # row contains metadata
  meta_row: 2
  # rows contain config data from this
  data_row_start: 3
  # sheet name should add this suffix
  # to find the proto message.
  type_suffix: "Sheet"
  # config data rows' list name in the
  # sheet proto message.
  list_field_name: "List"
  # sheet name should add this suffix
  # to find the data row proto message.
  row_type_suffix: "SheetRow"
  # optional prefix or suffix that marks a sheet for
  # transposed parsing (column-per-record).
  # e.g. "~" means sheet "Hero~" or "~Hero" is parsed
  # column-wise. the mark is stripped before
  # proto type lookup.
  transpose_mark: ""

# optional constant value replacement config
# cell values matching ref_quote delimiters (e.g. [Key])
# are replaced with the corresponding constant value.
constant:
  enabled: false
  # number of leading rows to skip in constant sheets
  skip_rows: 1
  # prefix that marks a key as a comment line
  comment: "#"
  # delimiters wrapping reference keys in cell values
  ref_quote:
    l: "["
    r: "]"
  # xlsx files containing key-value constant sheets
  files: []

# output file config
output:
  # output dir
  dir: "."
  # field order for proto-validated output:
  # "schema" (default) — order by proto field number
  # "source" — order by xlsx source column order
  field_order: "schema"
  # no schema, just transform raw sheet data
  raw_json:
    enabled: true
    # output dir, specific for raw_json
    dir: "."
    # output file extension, default 'json'
    extension: "json"
    indent: "  "
  # no schema, just transform raw sheet data
  raw_msgpack:
    enabled: true
    # output dir
    dir: "" # inherits `output.dir` when empty or not configured.
    # output file extension, default 'msgpack'
    extension: "msgpack"
  # validated by protobuf schema, serialized to json
  json:
    enabled: true
    # output dir
    dir: "."
    # output file extension, default 'json'
    extension: "json"
    indent: "  "
  # validated by protobuf schema, serialized to msgpack binary format
  msgpack:
    enabled: true
    # output dir
    dir: "."
    # output file extension, default 'msgpack'
    extension: "msgpack"
  # validated by protobuf schema, serialized to protobuf binary
  pb_bytes:
    enabled: true
    # output dir
    dir: "."
    # output file extension, default 'bytes'
    extension: "bytes"
